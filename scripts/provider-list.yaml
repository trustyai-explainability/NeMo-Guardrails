# Build time guardrails selection
profiles:
  opensource:
    description: "Open source guardrails only"
    include_closed_source: false

  all:
    description: "All available guardrails (open + closed source)"
    include_closed_source: true

# Define which guardrails are closed source or otherwise known to not work as expected (everything else is considered open source)
closed_source_guardrails:
  - "activefence"
  - "ai_defense"
  - "autoalign"
  - "clavata"
  - "cleanlab"
  - "crowdstrike_aidr"
  - "fiddler"
  - "gcp_moderate_text"
  - "jailbreak_detection" # waiting on upstream fixes: https://github.com/NVIDIA-NeMo/Guardrails/issues/1739
  - "pangea"
  - "patronusai"
  - "policyai"
  - "privateai"
  - "prompt_security"
  - "trend_micro"
