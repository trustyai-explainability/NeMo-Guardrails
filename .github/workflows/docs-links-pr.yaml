name: Docs / Link Check

on:
  pull_request:
    branches: [develop]
    types: [opened, reopened, synchronize]
    paths:
      - "**/*.md"
      - "**/*.mdx"
      - "docs/index.yml"
      - ".github/workflows/docs-links-pr.yaml"
      - "scripts/check-docs-links.sh"

permissions:
  contents: read

jobs:
  markdown-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Determine changed documentation files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          mapfile -t doc_files < <(
            # Fern validates MDX routes during the docs build. This raw
            # Markdown job only checks repository-local .md links.
            git diff --name-only --diff-filter=ACMR "$base" "$head" -- \
              '*.md' \
              ':(exclude)node_modules/**' \
              ':(exclude)dist/**' \
              ':(exclude)vendor/**' \
              ':(exclude)build/**' \
            | LC_ALL=C sort -u
          )

          if [[ "${#doc_files[@]}" -eq 0 ]]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            printf '%s\n' "${doc_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run markdown link checker
        if: steps.changed.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          mapfile -t doc_files <<< "${{ steps.changed.outputs.files }}"
          bash scripts/check-docs-links.sh --local-only "${doc_files[@]}"

  fern-links:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "22"

      - name: Determine changed Fern documentation files
        id: changed
        shell: bash
        run: |
          set -euo pipefail
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          mapfile -t changed_files < <(
            git diff --name-only --diff-filter=ACMR "$base" "$head" -- \
              '*.mdx' \
              'docs/index.yml' \
              'scripts/check-docs-links.sh' \
              ':(exclude)docs/_static/python-sdk-reference/**' \
              ':(exclude)node_modules/**' \
              ':(exclude)dist/**' \
              ':(exclude)vendor/**' \
              ':(exclude)build/**' \
            | LC_ALL=C sort -u
          )

          full_scan=false
          fern_files=()
          for file in "${changed_files[@]}"; do
            case "$file" in
              docs/index.yml | scripts/check-docs-links.sh)
                full_scan=true
                ;;
              *.mdx)
                fern_files+=("$file")
                ;;
            esac
          done

          if [[ "$full_scan" == "false" && "${#fern_files[@]}" -eq 0 ]]; then
            echo "has_files=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          echo "has_files=true" >> "$GITHUB_OUTPUT"
          echo "full_scan=$full_scan" >> "$GITHUB_OUTPUT"
          {
            echo "files<<EOF"
            printf '%s\n' "${fern_files[@]}"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Run Fern route link checker
        if: steps.changed.outputs.has_files == 'true'
        shell: bash
        run: |
          set -euo pipefail
          if [[ "${{ steps.changed.outputs.full_scan }}" == "true" ]]; then
            bash scripts/check-docs-links.sh --local-only
          else
            mapfile -t fern_files <<< "${{ steps.changed.outputs.files }}"
            bash scripts/check-docs-links.sh --local-only "${fern_files[@]}"
          fi
