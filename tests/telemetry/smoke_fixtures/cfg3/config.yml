models:
  - type: main
    engine: openai
    model: gpt-4o-mini

rails:
  input:
    flows:
      - self check input
  output:
    flows:
      - self check output

prompts:
  - task: self_check_input
    content: "Is this safe? {{ user_input }}. yes or no."
  - task: self_check_output
    content: "Is this safe? {{ bot_response }}. yes or no."
